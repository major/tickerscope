query ChartMarketData(
  $symbols: [String!]!
  $symbolDialectType: MDSymbolDialectType!
  $where: TimeSeriesFilterInput!
) {
  marketData(symbols: $symbols, symbolDialectType: $symbolDialectType) {
    id
    originRequest {
      fromDialect
      symbol
    }
    pricing {
      timeSeries(where: $where) {
        period
        dataPoints {
          startDateTime
          endDateTime
          volume {
            value
          }
          last {
            value
          }
          low {
            value
          }
          high {
            value
          }
          open {
            value
          }
        }
      }
      quote {
        tradeDateTime
        timeliness
        quoteType
        volume {
          value
          formattedValue
        }
        percentChange {
          value
          formattedValue
        }
        netChange {
          value
          formattedValue
        }
        last {
          value
          formattedValue
        }
      }
      premarketQuote {
        last {
          value
          formattedValue
        }
        tradeDateTime
        timeliness
        volume {
          value
          formattedValue
        }
        percentChange {
          value
          formattedValue
        }
        quoteType
        netChange {
          value
          formattedValue
        }
      }
      postmarketQuote {
        volume {
          value
          formattedValue
        }
        tradeDateTime
        timeliness
        percentChange {
          formattedValue
          value
        }
        netChange {
          value
          formattedValue
        }
        quoteType
        last {
          value
          formattedValue
        }
      }
      currentMarketState
    }
  }
}
